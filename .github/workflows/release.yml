name: Release APK on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Patch Java home for Linux
        run: sed -i "s|org.gradle.java.home=.*|org.gradle.java.home=$JAVA_HOME|" android/gradle.properties

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Decode service-account.json
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > assets/service-account.json

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION%+*}" >> $GITHUB_OUTPUT

      - name: Build Release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build Release AAB
        run: flutter build appbundle --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}-${{ github.run_number }}
          name: "GupShupGo ${{ steps.version.outputs.tag }} (Build ${{ github.run_number }})"
          body: |
            ## Release — ${{ steps.version.outputs.tag }} (Build ${{ github.run_number }})

            Automatically generated from commit: ${{ github.sha }}

            ### Downloads
            | File | Architecture | Devices |
            |------|--------------|---------|
            | `app-arm64-v8a-release.apk` | arm64-v8a | All modern Android phones (2017+) |
            | `app-armeabi-v7a-release.apk` | armeabi-v7a | Older 32-bit ARM devices |
            | `app-x86_64-release.apk` | x86_64 | Emulators / Intel Chromebooks |
            | `app-release.aab` | — | Google Play Store upload |

            > **Not sure which APK?** Pick `arm64-v8a` — works on virtually all phones made after 2017.
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
